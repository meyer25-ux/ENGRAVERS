<!DOCTYPE html>
<html lang="en" style="color-scheme: light;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — ENGRAVERS</title>
  <meta name="color-scheme" content="light only">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f6eb;
      color: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px 20px;
    }
    .big-num {
      font-family: 'Syne', sans-serif;
      font-size: clamp(80px, 20vw, 160px);
      font-weight: 800;
      color: #2d5a1b;
      line-height: 1;
      opacity: .12;
      user-select: none;
    }
    .icon {
      font-size: 56px;
      margin: -24px 0 16px;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 800;
      color: #2d5a1b;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      color: #4a7c35;
      max-width: 340px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #2d5a1b;
      color: #deecd6;
      border-radius: 100px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      transition: background .2s;
    }
    .btn:hover { background: #1a3d08; }
    .btn-ghost {
      display: inline-block;
      margin-left: 12px;
      padding: 14px 32px;
      border: 2px solid #2d5a1b;
      color: #2d5a1b;
      border-radius: 100px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      text-decoration: none;
      transition: all .2s;
    }
    .btn-ghost:hover { background: #2d5a1b; color: #deecd6; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>
  <div class="big-num">404</div>
  <div class="icon"></div>
  <h1>Page Not Found</h1>
  <p>This page doesn't exist — but your perfect custom case does. Let's get you back on track.</p>
  <div class="actions">
    <a href="/" class="btn">Go Home</a>
    <a href="/order.html" class="btn-ghost">Order a Case</a>
  </div>
</body>
</html>
