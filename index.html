<!DOCTYPE html>
<html lang="en" style="color-scheme: light;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENGRAVERS</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap">
    <meta name="color-scheme" content="light only">
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hero">
    <h1>ENGRAVERS</h1>
    <P>Your Phone, Your Story</P>
    <div class="carousel">
        <div class="case-wrap left">
            <img class="phone-case" src="images/iphone.png" alt="iPhone case" />
            <span class="case-label">iphone</span>
        </div>
        <div class="case-wrap active">
            <img class="phone-case" src="images/samsung.png" alt="Samsung" />
            <span class="case-label">Samsung</span>
        </div>
        <div class="case-wrap right">
            <img class="phone-case" src="images/gpixel.png" alt="Google Pixel" />
            <span class="case-label">Google Pixel</span>
        </div>
    </div>
  </div>

  <div class="order-section">
    <div class="order-content">
      <div class="order-tag"> custom made phone cases</div>
      <h2>Order Your Custom Phone Case</h2>
      <p>Pick your model, upload your vibe, and we'll make it real.</p>
      <button class="order-btn">Order Now →</button>
    </div>
  </div>  
</body>
<script src="script.js"</script>
</html>
